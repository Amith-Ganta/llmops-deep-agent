replicaCount: 1

image:
  repository: ghcr.io/amith-ganta/llmops-deep-agent
  tag: latest
  # The GHCR package is public, so nodes pull CI-built images directly; Always
  # makes a rollout restart pick up the newest :latest without `kind load`.
  pullPolicy: Always

# Kubernetes Secret holding GROQ_API_KEY / TAVILY_API_KEY / LANGFUSE_* keys.
# Created out-of-band:  kubectl create secret generic deep-agent-secrets --from-env-file=.env
existingSecret: deep-agent-secrets

# Non-secret agent configuration, rendered into a ConfigMap
config:
  DEEPAGENT_MODEL: "groq:llama-3.3-70b-versatile"
  SUBAGENT_MODEL: "groq:llama-3.1-8b-instant"
  DEEPAGENT_BACKEND: "StateBackend"
  ENABLE_WEB_SEARCH: "true"
  ENABLE_SUBAGENTS: "true"
  EAGER_INIT: "true"

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# Streamlit UI (frontend/app.py) as its own Deployment + Service. It reaches
# the API via in-cluster DNS set by the template. Local/kind profile keeps it
# ClusterIP (port-forward 8501); the EKS release overrides type: LoadBalancer.
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: amith98480/llmops-deep-agent-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

probes:
  # EAGER_INIT builds the agent graph before uvicorn answers, so give the
  # container a startup window before liveness starts counting failures.
  startup:
    path: /health
    periodSeconds: 5
    failureThreshold: 24   # up to 2 min of warmup
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /ready
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 6
